version: '3.8'

services:
  # Node.js API Service
  cookquest-api:
    build:
      context: ../node-services/api-server
      dockerfile: Dockerfile
    container_name: cookquest-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=sqlite:///app/data/cookquest.db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_here
      - AI_SERVICE_URL=http://cookquest-ai:8000
      - AI_SERVICE_TOKEN=your_ai_service_token
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - api_data:/app/data
      - ../node-services/api-server:/app
      - /app/node_modules
    depends_on:
      - redis
      - postgres
    networks:
      - cookquest_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python AI Service
  cookquest-ai:
    build:
      context: ../python-services/ai-service
      dockerfile: Dockerfile
    container_name: cookquest-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - PORT=8000
      - DATABASE_URL=postgresql://cookquest:password@postgres:5432/cookquest
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVICE_JWT_SECRET=your_service_jwt_secret
      - NODE_API_URL=http://cookquest-api:3001
    volumes:
      - ai_models:/app/models
      - ../python-services/ai-service:/app
    depends_on:
      - redis
      - postgres
    networks:
      - cookquest_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cookquest-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cookquest
      - POSTGRES_USER=cookquest
      - POSTGRES_PASSWORD=password
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../shared/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    networks:
      - cookquest_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookquest -d cookquest"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cookquest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    networks:
      - cookquest_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cookquest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites-available:/etc/nginx/sites-available
      - ./ssl:/etc/ssl/certs
    depends_on:
      - cookquest-api
      - cookquest-ai
    networks:
      - cookquest_network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: cookquest-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - cookquest_network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: cookquest-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - cookquest_network

networks:
  cookquest_network:
    driver: bridge

volumes:
  api_data:
    driver: local
  ai_models:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local