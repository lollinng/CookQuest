# CookQuest Kubernetes Deployment Configuration

# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: cookquest
  labels:
    name: cookquest

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cookquest-config
  namespace: cookquest
data:
  NODE_ENV: "production"
  ENVIRONMENT: "production"
  DATABASE_URL: "postgresql://cookquest:password@postgres-service:5432/cookquest"
  REDIS_URL: "redis://redis-service:6379"
  AI_SERVICE_URL: "http://cookquest-ai-service:8000"
  NODE_API_URL: "http://cookquest-api-service:3001"
  FRONTEND_URL: "https://cookquest.app"

---
# Secrets for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: cookquest-secrets
  namespace: cookquest
type: Opaque
stringData:
  JWT_SECRET: "your_production_jwt_secret_here"
  AI_SERVICE_TOKEN: "your_ai_service_token_here"
  SERVICE_JWT_SECRET: "your_service_jwt_secret_here"
  OPENAI_API_KEY: "your_openai_api_key_here"
  POSTGRES_PASSWORD: "your_postgres_password_here"
  REDIS_PASSWORD: "your_redis_password_here"

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: cookquest
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "cookquest"
        - name: POSTGRES_USER
          value: "cookquest"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cookquest-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-scripts
        configMap:
          name: postgres-init

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: cookquest
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
# PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: cookquest
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cookquest
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cookquest-secrets
              key: REDIS_PASSWORD
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: cookquest
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: cookquest
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# Node.js API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cookquest-api
  namespace: cookquest
  labels:
    app: cookquest-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cookquest-api
  template:
    metadata:
      labels:
        app: cookquest-api
    spec:
      containers:
      - name: cookquest-api
        image: cookquest/api-server:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        envFrom:
        - configMapRef:
            name: cookquest-config
        - secretRef:
            name: cookquest-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---
# Node.js API Service
apiVersion: v1
kind: Service
metadata:
  name: cookquest-api-service
  namespace: cookquest
spec:
  selector:
    app: cookquest-api
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP

---
# Python AI Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cookquest-ai
  namespace: cookquest
  labels:
    app: cookquest-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cookquest-ai
  template:
    metadata:
      labels:
        app: cookquest-ai
    spec:
      containers:
      - name: cookquest-ai
        image: cookquest/ai-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        envFrom:
        - configMapRef:
            name: cookquest-config
        - secretRef:
            name: cookquest-secrets
        volumeMounts:
        - name: ai-models
          mountPath: /app/models
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: ai-models
        persistentVolumeClaim:
          claimName: ai-models-pvc

---
# Python AI Service
apiVersion: v1
kind: Service
metadata:
  name: cookquest-ai-service
  namespace: cookquest
spec:
  selector:
    app: cookquest-ai
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

---
# AI Models PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-models-pvc
  namespace: cookquest
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# Ingress Controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cookquest-ingress
  namespace: cookquest
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.cookquest.app
    - ai.cookquest.app
    secretName: cookquest-tls
  rules:
  - host: api.cookquest.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cookquest-api-service
            port:
              number: 3001
  - host: ai.cookquest.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cookquest-ai-service
            port:
              number: 8000

---
# Horizontal Pod Autoscaler for API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cookquest-api-hpa
  namespace: cookquest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cookquest-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Horizontal Pod Autoscaler for AI Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cookquest-ai-hpa
  namespace: cookquest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cookquest-ai
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cookquest-network-policy
  namespace: cookquest
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: cookquest
    - podSelector: {}
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: cookquest
    - podSelector: {}
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443