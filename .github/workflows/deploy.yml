name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip waiting for CI (use for hotfixes)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-flight deploys

env:
  REGISTRY: ghcr.io

jobs:
  # ── Wait for CI to pass (skip on manual hotfix) ──────────────────────
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_tests) }}
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: 'Build Frontend'
          wait-interval: 15
          allowed-conclusions: success

  # ── Build & push Docker images to GHCR ───────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [wait-for-ci]
    if: ${{ !cancelled() && (needs.wait-for-ci.result == 'success' || needs.wait-for-ci.result == 'skipped') }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ env.REGISTRY }}/${{ github.repository_owner }}/cookquest-web" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ env.REGISTRY }}/${{ github.repository_owner }}/cookquest-api" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:latest
            ${{ steps.meta.outputs.web_image }}:${{ steps.meta.outputs.sha_short }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://cookquest.app/api/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/node-services/api-server
          file: ./backend/node-services/api-server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:latest
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS via SSH ────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: ${{ needs.build-and-push.result == 'success' }}
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/cookquest

            # Pull latest images
            echo "Pulling latest images..."
            docker compose pull cookquest-web cookquest-api

            # Bring up services with zero-downtime (recreate only changed)
            echo "Restarting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              --profile prod up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            # Wait for health check
            echo "Waiting for API health check..."
            timeout 60 bash -c 'until curl -sf http://localhost:3003/ready; do sleep 2; done'
            echo "Deployment complete!"
